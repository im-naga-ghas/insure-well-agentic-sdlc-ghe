trigger: none

pr:
  autoCancel: true
  branches:
    include:
      - main
  paths:
    include:
      - src/frontend/**
      - pipelines/frontend.yml

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    clean: true
    fetchDepth: 0

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      architecture: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: 'Use Java 17'

  - script: |
      mvn -B clean verify
    displayName: 'Build and test backend (Spring Boot)'
    workingDirectory: src/backend

  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Use Node.js 18'

  - script: |
      npm ci
      npm run build
    displayName: 'Install and build frontend (React)'
    workingDirectory: src/frontend
