spring.application.name=insurewell
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:insurewell
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.insurewell=DEBUG

# Security defaults for local development (override via environment variables in CI/production)
insurewell.cors.allowed-origin=${INSUREWELL_CORS_ALLOWED_ORIGIN:http://localhost:3000}
insurewell.security.users.admin.username=${INSUREWELL_ADMIN_USERNAME:admin}
insurewell.security.users.admin.password=${INSUREWELL_ADMIN_PASSWORD:admin123}
insurewell.security.users.alex.username=${INSUREWELL_ALEX_USERNAME:alex}
insurewell.security.users.alex.password=${INSUREWELL_ALEX_PASSWORD:alex123}
insurewell.security.users.alex.holder-name=${INSUREWELL_ALEX_HOLDER_NAME:Alex Johnson}
insurewell.security.users.maria.username=${INSUREWELL_MARIA_USERNAME:maria}
insurewell.security.users.maria.password=${INSUREWELL_MARIA_PASSWORD:maria123}
insurewell.security.users.maria.holder-name=${INSUREWELL_MARIA_HOLDER_NAME:Maria Garcia}
insurewell.security.users.david.username=${INSUREWELL_DAVID_USERNAME:david}
insurewell.security.users.david.password=${INSUREWELL_DAVID_PASSWORD:david123}
insurewell.security.users.david.holder-name=${INSUREWELL_DAVID_HOLDER_NAME:David Chen}
