name: CI Build

on:
  push:
    branches: [ main, develop, ghas-1 ]
  pull_request:
    branches: [ main, develop, ghas-1 ]

jobs:
  build-python:
    name: Build Python Application
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Run tests
        run: |
          cd backend
          pytest --cov=. --cov-report=xml --cov-report=term -v
        continue-on-error: true
      
      - name: Check Flask app starts
        run: |
          cd backend
          timeout 5 python -c "from app import app; print('Flask app loaded successfully')" || true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage-${{ matrix.python-version }}
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          pip install safety bandit
      
      - name: Check dependencies with Safety
        run: |
          cd backend
          safety check --file requirements.txt || true
        continue-on-error: true
      
      - name: Run Bandit security linter
        run: |
          bandit -r backend/ -f json -o bandit-report.json || true
        continue-on-error: true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
        if: always()

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [build-python, security-scan]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-python.result }}" == "success" ]; then
            echo "✅ All Python builds passed successfully!"
            exit 0
          else
            echo "❌ Python build failed!"
            exit 1
          fi
