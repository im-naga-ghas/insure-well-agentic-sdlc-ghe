name: Release and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

concurrency:
  group: "release-deploy"
  cancel-in-progress: false

jobs:
  # Job 1: Build and Test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run tests
        run: |
          cd backend
          pytest --cov=. --cov-report=term -v || true
        continue-on-error: true

      - name: Verify Flask app loads
        run: |
          cd backend
          python -c "from app import app; print('✅ Flask app loaded successfully')"

  # Job 2: Create Release and Packages
  release:
    name: Create Release and Packages
    runs-on: ubuntu-latest
    needs: build
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_url: ${{ steps.create_release.outputs.html_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Create release packages
        run: |
          # Create ZIP package
          cd backend
          zip -r ../memory-game-${{ steps.version.outputs.version }}.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "*.json" \
            -x ".pytest_cache/*" \
            -x "*.egg-info/*"
          
          # Create TAR.GZ package
          cd ..
          tar --exclude='*.pyc' \
              --exclude='__pycache__' \
              --exclude='*.json' \
              --exclude='.pytest_cache' \
              -czf memory-game-${{ steps.version.outputs.version }}.tar.gz \
              -C backend .
          
          # List created packages
          echo "📦 Created packages:"
          ls -la memory-game-*

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🎮 Memory Game Release ${{ steps.version.outputs.version }}
          
          ### What's New
          - Built from commit: ${{ github.sha }}
          - Build number: ${{ github.run_number }}
          - Full-stack Python Flask application
          
          ### 📦 Assets
          | Package | Description |
          |---------|-------------|
          | `memory-game-${{ steps.version.outputs.version }}.zip` | Python Flask app (ZIP) |
          | `memory-game-${{ steps.version.outputs.version }}.tar.gz` | Python Flask app (TAR.GZ) |
          
          ### 🚀 Deployment Options
          - **Render.com** - Use included `render.yaml`
          - **Railway** - One-click deploy
          - **GitHub Pages** - Static version (no backend API)
          
          ### 🛠️ Quick Start
          ```bash
          # Extract package
          unzip memory-game-${{ steps.version.outputs.version }}.zip -d memory-game
          cd memory-game
          
          # Install dependencies
          pip install -r requirements.txt
          
          # Run locally
          python app.py
          
          # Production deployment
          gunicorn app:app --bind 0.0.0.0:5000
          ```
          
          ### 📝 Changelog
          - Merged from develop branch to main
          - See [commit history](https://github.com/${{ github.repository }}/commits/main) for details
          EOF

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Memory Game ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            memory-game-${{ steps.version.outputs.version }}.zip
            memory-game-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "### 📦 Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** ${{ steps.create_release.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Packages:**" >> $GITHUB_STEP_SUMMARY
          echo "- memory-game-${{ steps.version.outputs.version }}.zip" >> $GITHUB_STEP_SUMMARY
          echo "- memory-game-${{ steps.version.outputs.version }}.tar.gz" >> $GITHUB_STEP_SUMMARY

  # Job 3: Publish to GitHub Packages
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim

          WORKDIR /app

          # Copy requirements and install dependencies
          COPY backend/requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt gunicorn

          # Copy application files
          COPY backend/ .

          # Expose port
          EXPOSE 5000

          # Set environment variables
          ENV FLASK_APP=app.py
          ENV FLASK_ENV=production

          # Run with gunicorn
          CMD ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "app:app"]
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package Summary
        run: |
          echo "### 📦 Package Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ghcr.io/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Available Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull and run:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 5000:5000 ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Job 4: Deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [release, publish]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public/css public/js
          
          # Copy HTML template
          cp backend/templates/index.html public/
          
          # Copy static assets
          cp -r backend/static/css/* public/css/
          cp -r backend/static/js/* public/js/
          
          # Fix Jinja2 template URLs for static hosting
          sed -i "s|{{ url_for('static', filename='css/styles.css') }}|css/styles.css|g" public/index.html
          sed -i "s|{{ url_for('static', filename='js/game.js') }}|js/game.js|g" public/index.html
          
          # Remove any remaining Jinja2 syntax
          sed -i 's/{{[^}]*}}//g' public/index.html
          sed -i 's/{%[^%]*%}//g' public/index.html
          
          echo "📁 Static site contents:"
          ls -la public/
          ls -la public/css/
          ls -la public/js/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "### 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ needs.release.outputs.release_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Live Site:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Package:** ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Memory Game deployed to GitHub Pages!" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker image published to GitHub Packages!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **Note:** GitHub Pages serves static files only. For full backend features, use the Docker image." >> $GITHUB_STEP_SUMMARY
