name: 'Dependency Review'

on:
  pull_request:
    branches: [ main, develop, ghas-1 ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the action if vulnerabilities with the specified severity or higher are detected
          fail-on-severity: moderate
          # Allow these licenses
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC, Python-2.0, PSF-2.0, Unlicense, CC0-1.0
          # Comment on the PR with the results
          comment-summary-in-pr: always
          # Configuration for vulnerability detection
          vulnerability-check: true
          # Configuration for license checking
          license-check: true
          # Retry configuration
          retry-on-snapshot-warnings: true
          # Base and head refs for comparison (automatically set for PRs)
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
