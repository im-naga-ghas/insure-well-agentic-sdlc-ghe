# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "im-naga-ghas"
    assignees:
      - "im-naga-ghas"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    allow:
      - dependency-type: "all"
    groups:
      flask:
        patterns:
          - "flask*"
          - "werkzeug"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "pytest*"
          - "flake8"
          - "bandit"
          - "safety"
        update-types:
          - "minor"
          - "patch"
