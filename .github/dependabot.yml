# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Java Spring Boot dependencies (Maven)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "im-naga-ghas"
    assignees:
      - "im-naga-ghas"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "java"
      - "spring-boot"
    versioning-strategy: increase
    allow:
      - dependency-type: "all"
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "org.springdoc*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
        update-types:
          - "minor"
          - "patch"

  # React frontend dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "im-naga-ghas"
    assignees:
      - "im-naga-ghas"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "react"
    versioning-strategy: increase
    allow:
      - dependency-type: "all"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      linting-and-testing:
        patterns:
          - "eslint*"
          - "prettier"
          - "jest*"
          - "@testing-library/*"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
