[tool.ruff]
line-length = 127
target-version = "py39"
extend-exclude = [
    "data",
    "uploads",
    ".venv",
    "venv",
]

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, B = flake8-bugbear,
# UP = pyupgrade, S = flake8-bandit-lite, C4 = comprehensions
select = ["E", "W", "F", "I", "B", "UP", "C4"]
ignore = [
    "E501",  # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # allow asserts in tests

[tool.black]
line-length = 127
target-version = ["py39", "py310", "py311", "py312"]
extend-exclude = '''
/(
    \.venv
  | venv
  | data
  | uploads
)/
'''

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "uploads", "data"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = ["data/", "uploads/", ".venv/", "venv/"]
