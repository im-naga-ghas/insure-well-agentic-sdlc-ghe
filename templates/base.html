<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InsureWell – {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <span class="brand-icon">🛡️</span>
        <span class="brand-name">InsureWell</span>
      </div>
      <ul class="navbar-links">
        <li>
          <a href="{{ url_for('dashboard') }}"
             class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
            Dashboard
          </a>
        </li>
        <li>
          <a href="{{ url_for('claims_page') }}"
             class="nav-link {% if request.endpoint == 'claims_page' %}active{% endif %}">
            Claims
          </a>
        </li>
      </ul>
      <div class="navbar-actions">
        {% if g.current_user %}
        <span class="nav-user">Hi, {{ g.current_user['username'] }}</span>
        <form method="post" action="{{ url_for('logout') }}">
          <button type="submit" class="btn btn-ghost nav-logout">Logout</button>
        </form>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
